<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智能文档问答系统</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --surface2:  #21253a;
      --border:    #2e3250;
      --border2:   #3a3f62;
      --primary:   #6c8fff;
      --primary-d: #4f6ef7;
      --green:     #34d399;
      --yellow:    #fbbf24;
      --red:       #f87171;
      --text:      #e2e8f0;
      --text2:     #94a3b8;
      --text3:     #64748b;
      --radius:    10px;
      --shadow:    0 4px 24px rgba(0,0,0,.4);
    }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.6;
    }
    a { color: var(--primary); text-decoration: none; }
    /* ── Layout ── */
    .app {
      display: grid;
      grid-template-columns: 360px 1fr;
      grid-template-rows: 56px 1fr;
      height: 100vh;
      overflow: hidden;
    }
    /* ── Header ── */
    .header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .header-logo {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, var(--primary), #a78bfa);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
    }
    .header-title { font-size: 16px; font-weight: 700; letter-spacing: -.3px; }
    .header-sub { font-size: 12px; color: var(--text3); margin-top: 1px; }
    .header-spacer { flex: 1; }
    .header-badge {
      font-size: 11px; color: var(--text3);
      background: var(--surface2); border: 1px solid var(--border);
      padding: 3px 10px; border-radius: 20px;
    }
    /* ── Left Panel ── */
    .left-panel {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel-header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .panel-title { font-size: 13px; font-weight: 600; color: var(--text2); letter-spacing: .5px; text-transform: uppercase; }
    /* ── Upload ── */
    .upload-zone {
      margin: 16px 20px 0;
      border: 2px dashed var(--border2);
      border-radius: var(--radius);
      padding: 24px 16px;
      text-align: center;
      cursor: pointer;
      transition: all .2s;
      position: relative;
    }
    .upload-zone:hover, .upload-zone.drag { border-color: var(--primary); background: rgba(108,143,255,.06); }
    .upload-zone input { display: none; }
    .upload-icon { font-size: 28px; margin-bottom: 8px; }
    .upload-zone p { color: var(--text3); font-size: 13px; }
    .upload-zone em { color: var(--primary); font-style: normal; font-weight: 600; }
    .upload-hint { font-size: 11px; margin-top: 4px; }
    .upload-progress {
      display: none;
      margin: 12px 20px 0;
      height: 3px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .upload-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), #a78bfa);
      width: 0%;
      transition: width .3s;
      border-radius: 99px;
    }
    /* ── Doc List ── */
    .doc-list-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 12px 20px 20px;
    }
    .doc-list-empty {
      text-align: center;
      color: var(--text3);
      padding: 40px 0;
      font-size: 13px;
    }
    .doc-list-empty .empty-icon { font-size: 36px; margin-bottom: 12px; opacity: .5; }
    .doc-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      margin-bottom: 8px;
      cursor: pointer;
      transition: all .15s;
      background: var(--bg);
      position: relative;
    }
    .doc-item:hover { border-color: var(--border2); background: var(--surface2); }
    .doc-item.selected {
      border-color: var(--primary);
      background: rgba(108,143,255,.1);
    }
    .doc-item.selected .doc-check { opacity: 1; background: var(--primary); border-color: var(--primary); color: #fff; }
    .doc-check {
      width: 18px; height: 18px; min-width: 18px;
      border: 1.5px solid var(--border2);
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      margin-top: 2px;
      font-size: 11px;
      opacity: .5;
      transition: all .15s;
    }
    .doc-info { flex: 1; min-width: 0; }
    .doc-name {
      font-size: 13px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      color: var(--text);
    }
    .doc-meta { font-size: 11px; color: var(--text3); margin-top: 2px; display: flex; gap: 8px; flex-wrap: wrap; }
    .doc-badge {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: 11px; font-weight: 500; padding: 1px 7px;
      border-radius: 99px;
    }
    .badge-pending  { background: rgba(100,116,139,.15); color: var(--text3); }
    .badge-processing { background: rgba(251,191,36,.12); color: var(--yellow); }
    .badge-done     { background: rgba(52,211,153,.12);  color: var(--green); }
    .badge-failed   { background: rgba(248,113,113,.12); color: var(--red); }
    .doc-delete {
      position: absolute; right: 8px; top: 8px;
      width: 22px; height: 22px;
      background: none; border: none; cursor: pointer;
      color: var(--text3); font-size: 13px;
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity .15s;
    }
    .doc-item:hover .doc-delete { opacity: 1; }
    .doc-delete:hover { background: rgba(248,113,113,.15); color: var(--red); }
    /* ── Selected Bar ── */
    .selected-bar {
      margin: 0 20px 12px;
      padding: 8px 12px;
      background: rgba(108,143,255,.1);
      border: 1px solid rgba(108,143,255,.3);
      border-radius: 8px;
      font-size: 12px;
      color: var(--primary);
      display: none;
    }
    .selected-bar.visible { display: flex; align-items: center; gap: 8px; }
    /* ── Right Panel ── */
    .right-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }
    /* ── Chat Header ── */
    .chat-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
    }
    /* ── Mode Toggle ── */
    .mode-toggle {
      display: flex;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3px;
    }
    .mode-btn {
      border: none; background: none; cursor: pointer;
      padding: 5px 14px;
      border-radius: 6px;
      font-size: 12px; font-weight: 500;
      color: var(--text3);
      transition: all .15s;
    }
    .mode-btn.active {
      background: var(--primary-d);
      color: #fff;
    }
    .session-info {
      font-size: 11px; color: var(--text3);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 4px 10px; border-radius: 6px;
      display: flex; align-items: center; gap: 6px;
      cursor: pointer;
      transition: border-color .15s;
    }
    .session-info:hover { border-color: var(--border2); }
    .session-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
    .chat-header-actions { display: flex; gap: 8px; margin-left: auto; }
    /* ── Buttons ── */
    .btn {
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text2);
      padding: 6px 14px;
      border-radius: 7px;
      font-size: 12px; font-weight: 500;
      cursor: pointer;
      transition: all .15s;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .btn:hover { border-color: var(--border2); color: var(--text); }
    .btn-primary { background: var(--primary-d); border-color: var(--primary-d); color: #fff; }
    .btn-primary:hover { background: var(--primary); border-color: var(--primary); }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
    .btn-danger { color: var(--red); }
    .btn-danger:hover { background: rgba(248,113,113,.1); border-color: var(--red); }
    .btn-sm { padding: 4px 10px; font-size: 11px; }
    /* ── Messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }
    /* ── Message Bubbles ── */
    .msg { display: flex; gap: 12px; max-width: 100%; }
    .msg.user { flex-direction: row-reverse; }
    .msg-avatar {
      width: 32px; height: 32px; min-width: 32px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 600;
    }
    .msg.user .msg-avatar { background: linear-gradient(135deg, var(--primary-d), #a78bfa); }
    .msg.assistant .msg-avatar { background: linear-gradient(135deg, #10b981, #059669); font-size: 16px; }
    .msg-body { max-width: 80%; display: flex; flex-direction: column; gap: 4px; }
    .msg.user .msg-body { align-items: flex-end; }
    .msg-label { font-size: 11px; color: var(--text3); padding: 0 4px; }
    .msg-bubble {
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.65;
      font-size: 14px;
    }
    .msg.user .msg-bubble {
      background: var(--primary-d);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.assistant .msg-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }
    .msg.assistant .msg-bubble.streaming::after {
      content: '▍';
      display: inline-block;
      animation: blink .6s step-end infinite;
      color: var(--primary);
      margin-left: 1px;
    }
    @keyframes blink { 50% { opacity: 0; } }
    /* Markdown inside bubble */
    .msg-bubble p { margin-bottom: .6em; }
    .msg-bubble p:last-child { margin-bottom: 0; }
    .msg-bubble ul, .msg-bubble ol { padding-left: 1.4em; margin-bottom: .6em; }
    .msg-bubble li { margin-bottom: .2em; }
    .msg-bubble code {
      background: rgba(255,255,255,.08);
      padding: 1px 5px; border-radius: 4px;
      font-family: 'JetBrains Mono', monospace; font-size: .9em;
    }
    .msg-bubble pre {
      background: rgba(0,0,0,.3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      overflow-x: auto;
      margin: .5em 0;
    }
    .msg-bubble pre code { background: none; padding: 0; }
    .msg-bubble h1,.msg-bubble h2,.msg-bubble h3,.msg-bubble h4 {
      font-size: 1em; font-weight: normal; margin: .6em 0 .2em; line-height: 1.5;
    }
    .msg-bubble strong { font-weight: normal; }
    .msg-bubble blockquote {
      border-left: 3px solid var(--primary);
      padding-left: 12px;
      color: var(--text2);
      margin: .5em 0;
    }
    .msg-bubble table { border-collapse: collapse; width: 100%; margin: .5em 0; }
    .msg-bubble th,.msg-bubble td {
      border: 1px solid var(--border); padding: 6px 10px; font-size: 13px;
    }
    .msg-bubble th { background: var(--surface2); }
    /* ── Sources ── */
    .sources-wrap { margin-top: 8px; }
    .sources-toggle {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; color: var(--text3);
      cursor: pointer; padding: 3px 8px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface2);
      transition: all .15s;
    }
    .sources-toggle:hover { border-color: var(--primary); color: var(--primary); }
    .sources-toggle .arrow { transition: transform .2s; }
    .sources-toggle.open .arrow { transform: rotate(90deg); }
    .sources-list {
      display: none;
      margin-top: 8px;
      display: none;
      flex-direction: column;
      gap: 6px;
    }
    .sources-list.visible { display: flex; }
    .source-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px;
    }
    .source-card-header {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 5px; color: var(--text2);
    }
    .source-chip {
      background: rgba(108,143,255,.15);
      color: var(--primary);
      padding: 1px 7px; border-radius: 99px;
      font-size: 11px; font-weight: 600;
    }
    .source-snippet { color: var(--text3); line-height: 1.5; }
    /* ── Error msg ── */
    .msg-error {
      font-size: 12px; color: var(--red);
      padding: 8px 12px;
      background: rgba(248,113,113,.08);
      border: 1px solid rgba(248,113,113,.2);
      border-radius: 8px;
    }
    /* ── Welcome ── */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text3);
      text-align: center;
      padding: 40px;
    }
    .welcome-icon { font-size: 48px; opacity: .4; }
    .welcome h3 { font-size: 18px; font-weight: 600; color: var(--text2); }
    .welcome p { font-size: 13px; max-width: 360px; line-height: 1.7; }
    .welcome-tips {
      display: flex; gap: 12px; margin-top: 8px; flex-wrap: wrap; justify-content: center;
    }
    .tip-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      cursor: pointer;
      transition: all .15s;
      text-align: left;
      max-width: 180px;
    }
    .tip-card:hover { border-color: var(--primary); color: var(--text); }
    .tip-card .tip-icon { font-size: 18px; margin-bottom: 4px; }
    /* ── Input ── */
    .input-area {
      padding: 16px 20px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .input-wrap {
      flex: 1;
      position: relative;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: border-color .15s;
    }
    .input-wrap:focus-within { border-color: var(--primary); }
    textarea {
      width: 100%;
      background: none;
      border: none;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      line-height: 1.6;
      padding: 12px 16px;
      resize: none;
      max-height: 160px;
      outline: none;
    }
    textarea::placeholder { color: var(--text3); }
    .send-btn {
      width: 42px; height: 42px;
      background: var(--primary-d);
      border: none; border-radius: 9px;
      color: #fff; font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
      flex-shrink: 0;
    }
    .send-btn:hover { background: var(--primary); }
    .send-btn:disabled { opacity: .3; cursor: not-allowed; }
    .input-hint {
      font-size: 11px; color: var(--text3); margin-top: 8px;
      display: flex; align-items: center; gap: 4px;
    }
    /* ── Toast ── */
    .toast-wrap {
      position: fixed; top: 20px; right: 20px;
      display: flex; flex-direction: column; gap: 8px;
      z-index: 9999; pointer-events: none;
    }
    .toast {
      padding: 10px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      box-shadow: var(--shadow);
      animation: slideIn .25s ease;
      opacity: 1;
      transition: opacity .3s;
    }
    .toast.success { border-color: var(--green); color: var(--green); }
    .toast.error   { border-color: var(--red);   color: var(--red); }
    .toast.info    { border-color: var(--primary); color: var(--primary); }
    @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } }
    /* ── Spinner ── */
    .spin {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--border2);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* ── Scrollbar global ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }
    /* ── Divider ── */
    .divider {
      height: 1px; background: var(--border);
      margin: 8px 0;
    }
    /* ── Tooltip ── */
    [data-tip] { position: relative; }
    [data-tip]:hover::after {
      content: attr(data-tip);
      position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%);
      background: #111; color: var(--text2);
      font-size: 11px; padding: 4px 8px;
      border-radius: 5px; white-space: nowrap;
      pointer-events: none; z-index: 100;
    }
  </style>
</head>
<body>

<div class="app">

  <!-- ── Header ── -->
  <header class="header">
    <div class="header-logo">🤖</div>
    <div>
      <div class="header-title">智能文档问答系统</div>
      <div class="header-sub">Document QA · Powered by DeepSeek</div>
    </div>
    <div class="header-spacer"></div>
    <div class="header-badge" id="apiStatus">⚪ 连接中…</div>
  </header>

  <!-- ── Left Panel: Documents ── -->
  <aside class="left-panel">
    <div class="panel-header">
      <span class="panel-title">📄 文档库</span>
      <button class="btn btn-sm" onclick="loadDocs()" data-tip="刷新列表">↻ 刷新</button>
    </div>

    <!-- Upload Zone -->
    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()"
         ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
      <input type="file" id="fileInput" accept=".pdf,.docx,.txt" onchange="onFileChange(event)" />
      <div class="upload-icon">📂</div>
      <p><em>点击上传</em>或拖拽文件到这里</p>
      <p class="upload-hint">支持 PDF · Word · TXT，最大 50 MB</p>
    </div>
    <div class="upload-progress" id="uploadProgress">
      <div class="upload-progress-bar" id="uploadProgressBar"></div>
    </div>

    <!-- Selected docs hint -->
    <div class="selected-bar" id="selectedBar">
      <span>✓</span>
      <span id="selectedCount">0 个文档已选中</span>
      <span style="flex:1"></span>
      <button class="btn btn-sm btn-danger" onclick="clearSelection()">清除选择</button>
    </div>

    <!-- Doc list -->
    <div class="doc-list-wrap" id="docList">
      <div class="doc-list-empty">
        <div class="empty-icon">📭</div>
        <div>暂无文档，请上传</div>
      </div>
    </div>
  </aside>

  <!-- ── Right Panel: Chat ── -->
  <main class="right-panel">

    <!-- Chat Header -->
    <div class="chat-header">
      <div class="mode-toggle">
        <button class="mode-btn active" id="modeDocQa" onclick="setMode('doc_qa')">📖 文档问答</button>
        <button class="mode-btn" id="modeFreeDocChat" onclick="setMode('free_doc_chat')">🔍 文档自由问答</button>
        <button class="mode-btn" id="modeFreechat" onclick="setMode('free_chat')">💬 自由聊天</button>
      </div>
      <div class="session-info" id="sessionInfo" onclick="newSession()" data-tip="点击开启新会话">
        <div class="session-dot" id="sessionDot"></div>
        <span id="sessionLabel">会话 —</span>
      </div>
      <div class="chat-header-actions">
        <button class="btn btn-sm btn-danger" onclick="clearHistory()" data-tip="清空当前会话记录">🗑 清空历史</button>
        <button class="btn btn-sm" onclick="newSession()" data-tip="开启全新会话">＋ 新会话</button>
      </div>
    </div>

    <!-- Messages -->
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">✨</div>
        <h3>开始智能问答</h3>
        <p>在左侧上传文档，选择文档后切换到<strong style="color:var(--primary)">文档问答</strong>模式；<br/>或直接切换到<strong style="color:var(--primary)">自由聊天</strong>与 AI 对话。</p>
        <div class="welcome-tips">
          <div class="tip-card" onclick="insertQuestion('这篇文档的主要内容是什么？')">
            <div class="tip-icon">📋</div>文档的主要内容是什么？
          </div>
          <div class="tip-card" onclick="insertQuestion('请帮我总结一下文档的关键点')">
            <div class="tip-icon">🔑</div>总结文档关键点
          </div>
          <div class="tip-card" onclick="insertQuestion('帮我写一首关于春天的诗')">
            <div class="tip-icon">🎨</div>帮我写一首诗
          </div>
          <div class="tip-card" onclick="insertQuestion('计算 (123 + 456) * 0.85')">
            <div class="tip-icon">🧮</div>数学计算
          </div>
        </div>
      </div>
    </div>

    <!-- Input -->
    <div class="input-area">
      <div class="input-row">
        <div class="input-wrap">
          <textarea
            id="questionInput"
            placeholder="输入问题，按 Ctrl+Enter 或点击发送…"
            rows="1"
            onkeydown="onKeyDown(event)"
            oninput="autoResize(this)"
          ></textarea>
        </div>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" data-tip="发送 (Ctrl+Enter)">➤</button>
      </div>
      <div class="input-hint" id="inputHint">
        <span id="modeHint">📖 文档问答模式：请先在左侧选择文档</span>
      </div>
    </div>
  </main>
</div>

<!-- Toast Container -->
<div class="toast-wrap" id="toastWrap"></div>

<script>
/* ══════════════════════════════════════════════
   State
══════════════════════════════════════════════ */
const API = '/api/v1';
let docs = [];
let selectedDocIds = new Set();
let currentMode = 'doc_qa';
let sessionId = newUUID();
let isStreaming = false;
let pollTimer = null;

/* ══════════════════════════════════════════════
   Utils
══════════════════════════════════════════════ */
function newUUID() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1024 / 1024).toFixed(1) + ' MB';
}

function timeAgo(iso) {
  const d = new Date(iso);
  const diff = (Date.now() - d) / 1000;
  if (diff < 60) return '刚刚';
  if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
  if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
  return d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
}

function toast(msg, type = 'info', duration = 3000) {
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => {
    el.style.opacity = '0';
    setTimeout(() => el.remove(), 300);
  }, duration);
}

function setApiStatus(online) {
  const el = document.getElementById('apiStatus');
  el.textContent = online ? '🟢 服务在线' : '🔴 服务离线';
}

/* ══════════════════════════════════════════════
   Document Management
══════════════════════════════════════════════ */
async function loadDocs() {
  try {
    const res = await fetch(`${API}/documents?page=1&page_size=50`);
    if (!res.ok) throw new Error(res.statusText);
    const body = await res.json();
    docs = body.data.items || [];
    setApiStatus(true);
    renderDocs();
    // Auto-poll if any doc is processing/pending
    const needPoll = docs.some(d => d.status === 'pending' || d.status === 'processing');
    if (needPoll && !pollTimer) {
      pollTimer = setInterval(loadDocs, 3000);
    } else if (!needPoll && pollTimer) {
      clearInterval(pollTimer);
      pollTimer = null;
    }
  } catch (e) {
    setApiStatus(false);
    console.error(e);
  }
}

function renderDocs() {
  const container = document.getElementById('docList');
  if (docs.length === 0) {
    container.innerHTML = `<div class="doc-list-empty"><div class="empty-icon">📭</div><div>暂无文档，请上传</div></div>`;
    return;
  }

  const statusMap = {
    pending:    ['badge-pending',    '⏳ 等待中'],
    processing: ['badge-processing', '<span class="spin"></span> 处理中'],
    done:       ['badge-done',       '✓ 就绪'],
    failed:     ['badge-failed',     '✕ 失败'],
  };

  container.innerHTML = docs.map(doc => {
    const [cls, label] = statusMap[doc.status] || ['badge-pending', doc.status];
    const isSelected = selectedDocIds.has(doc.id);
    const canSelect = doc.status === 'done';
    return `
      <div class="doc-item ${isSelected ? 'selected' : ''} ${!canSelect ? 'disabled' : ''}"
           onclick="toggleDocSelect(${doc.id})" style="${!canSelect ? 'opacity:.6;cursor:default' : ''}">
        <div class="doc-check">${isSelected ? '✓' : ''}</div>
        <div class="doc-info">
          <div class="doc-name" title="${escapeHtml(doc.filename)}">${escapeHtml(doc.filename)}</div>
          <div class="doc-meta">
            <span class="doc-badge ${cls}">${label}</span>
            <span>${formatSize(doc.file_size)}</span>
            ${doc.chunk_count > 0 ? `<span>${doc.chunk_count} 段</span>` : ''}
            <span>${timeAgo(doc.created_at)}</span>
          </div>
          ${doc.error_msg ? `<div style="font-size:11px;color:var(--red);margin-top:3px;">⚠ ${escapeHtml(doc.error_msg)}</div>` : ''}
        </div>
        <button class="doc-delete" onclick="deleteDoc(event, ${doc.id})" data-tip="删除">✕</button>
      </div>`;
  }).join('');

  updateSelectedBar();
}

function toggleDocSelect(docId) {
  const doc = docs.find(d => d.id === docId);
  if (!doc || doc.status !== 'done') return;
  if (selectedDocIds.has(docId)) {
    selectedDocIds.delete(docId);
  } else {
    selectedDocIds.add(docId);
  }
  renderDocs();
  updateHint();
}

function clearSelection() {
  selectedDocIds.clear();
  renderDocs();
  updateHint();
}

function updateSelectedBar() {
  const bar = document.getElementById('selectedBar');
  const cnt = selectedDocIds.size;
  document.getElementById('selectedCount').textContent = `${cnt} 个文档已选中`;
  if (cnt > 0) {
    bar.classList.add('visible');
  } else {
    bar.classList.remove('visible');
  }
}

async function deleteDoc(e, docId) {
  e.stopPropagation();
  const doc = docs.find(d => d.id === docId);
  if (!doc) return;
  if (!confirm(`确认删除「${doc.filename}」？`)) return;
  try {
    const res = await fetch(`${API}/documents/${docId}`, { method: 'DELETE' });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || res.statusText);
    }
    selectedDocIds.delete(docId);
    toast('文档已删除', 'success');
    loadDocs();
  } catch (e) {
    toast('删除失败：' + e.message, 'error');
  }
}

/* ── Upload ── */
function onDragOver(e) {
  e.preventDefault();
  document.getElementById('uploadZone').classList.add('drag');
}
function onDragLeave(e) {
  document.getElementById('uploadZone').classList.remove('drag');
}
function onDrop(e) {
  e.preventDefault();
  document.getElementById('uploadZone').classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file) uploadFile(file);
}
function onFileChange(e) {
  const file = e.target.files[0];
  if (file) uploadFile(file);
  e.target.value = '';
}

async function uploadFile(file) {
  const progressWrap = document.getElementById('uploadProgress');
  const progressBar  = document.getElementById('uploadProgressBar');

  progressWrap.style.display = 'block';
  progressBar.style.width = '10%';

  const fd = new FormData();
  fd.append('file', file);

  try {
    progressBar.style.width = '40%';
    const res = await fetch(`${API}/documents/upload`, { method: 'POST', body: fd });
    progressBar.style.width = '80%';

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || res.statusText);
    }
    progressBar.style.width = '100%';
    toast(`「${file.name}」上传成功，正在处理…`, 'success');
    setTimeout(() => { progressWrap.style.display = 'none'; progressBar.style.width = '0'; }, 600);
    loadDocs();
  } catch (e) {
    progressWrap.style.display = 'none';
    toast('上传失败：' + e.message, 'error');
  }
}

/* ══════════════════════════════════════════════
   Session
══════════════════════════════════════════════ */
function updateSessionLabel() {
  document.getElementById('sessionLabel').textContent = '会话 ' + sessionId.slice(0, 8);
}

function newSession() {
  if (isStreaming) return;
  sessionId = newUUID();
  updateSessionLabel();
  clearMessages();
  toast('已开启新会话', 'info');
}

async function clearHistory() {
  if (isStreaming) return;
  if (!confirm('确认清空当前会话的历史记录？')) return;
  try {
    await fetch(`${API}/chat/${sessionId}`, { method: 'DELETE' });
    clearMessages();
    toast('对话历史已清空', 'success');
  } catch (e) {
    toast('清空失败', 'error');
  }
}

function clearMessages() {
  const container = document.getElementById('messages');
  container.innerHTML = `
    <div class="welcome" id="welcome">
      <div class="welcome-icon">✨</div>
      <h3>开始智能问答</h3>
      <p>在左侧上传文档，选择文档后切换到<strong style="color:var(--primary)">文档问答</strong>模式；<br/>或直接切换到<strong style="color:var(--primary)">自由聊天</strong>与 AI 对话。</p>
    </div>`;
}

/* ══════════════════════════════════════════════
   Mode
══════════════════════════════════════════════ */
function setMode(mode) {
  currentMode = mode;
  document.getElementById('modeDocQa').classList.toggle('active', mode === 'doc_qa');
  document.getElementById('modeFreeDocChat').classList.toggle('active', mode === 'free_doc_chat');
  document.getElementById('modeFreechat').classList.toggle('active', mode === 'free_chat');
  updateHint();
}

function updateHint() {
  const hint = document.getElementById('modeHint');
  if (currentMode === 'doc_qa') {
    const cnt = selectedDocIds.size;
    if (cnt === 0) {
      hint.innerHTML = '📖 文档问答模式：请先在左侧<strong>选择文档</strong>';
    } else {
      const names = [...selectedDocIds].map(id => {
        const d = docs.find(x => x.id === id);
        return d ? d.filename.replace(/\.[^.]+$/, '') : id;
      }).join('、');
      hint.innerHTML = `📖 当前文档：<strong>${escapeHtml(names)}</strong>`;
    }
  } else if (currentMode === 'free_doc_chat') {
    hint.innerHTML = '🔍 文档自由问答模式：自动在全部文档中检索，无需选择文档';
  } else {
    hint.innerHTML = '💬 自由聊天模式：与 AI 自由对话，无需选择文档';
  }
}

/* ══════════════════════════════════════════════
   Chat
══════════════════════════════════════════════ */
function insertQuestion(q) {
  const ta = document.getElementById('questionInput');
  ta.value = q;
  autoResize(ta);
  ta.focus();
  // If in free_chat tip, switch to free_chat
  if (q.includes('写一首') || q.includes('计算')) setMode('free_chat');
}

function onKeyDown(e) {
  if (e.key === 'Enter' && e.ctrlKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

async function sendMessage() {
  if (isStreaming) return;
  const input = document.getElementById('questionInput');
  const question = input.value.trim();
  if (!question) return;

  // Validate
  if (currentMode === 'doc_qa' && selectedDocIds.size === 0) {
    toast('请先在左侧选择至少一个文档', 'error');
    return;
  }

  // Hide welcome
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  // Show user message
  appendUserMsg(question);
  input.value = '';
  autoResize(input);

  // Show assistant placeholder
  const { bubble, sourcesWrap } = appendAssistantMsg();

  isStreaming = true;
  document.getElementById('sendBtn').disabled = true;

  const body = {
    mode: currentMode,
    session_id: sessionId,
    question,
  };
  if (currentMode === 'doc_qa') {
    body.document_ids = [...selectedDocIds];
  }

  let fullText = '';
  let sources = [];

  try {
    const res = await fetch(`${API}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || res.statusText);
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      // Process SSE lines
      const lines = buffer.split('\n');
      buffer = lines.pop(); // keep incomplete line

      for (const line of lines) {
        if (line.startsWith('event: sources')) {
          // next data line will have sources
          continue;
        }
        if (line.startsWith('data: ')) {
          const data = line.slice(6);
          if (data === '[DONE]') continue;
          fullText += data;
          bubble.classList.add('streaming');
          bubble.innerHTML = escapeHtml(fullText).replace(/\n/g, '<br>');
          scrollToBottom();
        } else if (line.startsWith('data: ') && buffer.startsWith('[')) {
          // sources in data
        }
      }

      // Check for sources event in raw buffer
      const sourcesMatch = buffer.match(/event: sources\ndata: (\[.*?\])/s) ||
                           buffer.match(/event: sources\r\ndata: (\[.*?\])/s);
      if (sourcesMatch) {
        try { sources = JSON.parse(sourcesMatch[1]); } catch {}
        buffer = buffer.replace(sourcesMatch[0], '');
      }
    }

    // Handle any remaining sources event
    if (buffer.includes('event: sources')) {
      const m = buffer.match(/data: (\[.*\])/);
      if (m) {
        try { sources = JSON.parse(m[1]); } catch {}
      }
    }

    bubble.classList.remove('streaming');
    bubble.innerHTML = renderMd(fullText || '（无回答）');

    if (sources && sources.length > 0) {
      renderSources(sourcesWrap, sources);
    }

  } catch (e) {
    bubble.classList.remove('streaming');
    bubble.innerHTML = `<div class="msg-error">⚠ ${escapeHtml(e.message)}</div>`;
    toast('请求失败：' + e.message, 'error');
  } finally {
    isStreaming = false;
    document.getElementById('sendBtn').disabled = false;
    scrollToBottom();
  }
}

// Better SSE parser — rewrite with event-type tracking
async function sendMessageV2() {} // placeholder

/* ── Render helpers ── */
function appendUserMsg(text) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `
    <div class="msg-avatar">U</div>
    <div class="msg-body">
      <div class="msg-label">你</div>
      <div class="msg-bubble">${escapeHtml(text).replace(/\n/g, '<br>')}</div>
    </div>`;
  container.appendChild(div);
  scrollToBottom();
}

function appendAssistantMsg() {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg assistant';
  const modeName = currentMode === 'doc_qa' ? '文档问答' : currentMode === 'free_doc_chat' ? '文档自由问答' : '自由聊天';
  div.innerHTML = `
    <div class="msg-avatar">🤖</div>
    <div class="msg-body">
      <div class="msg-label">AI · ${modeName}</div>
      <div class="msg-bubble streaming" id="streamBubble"></div>
      <div class="sources-wrap" id="sourcesWrap"></div>
    </div>`;
  container.appendChild(div);
  scrollToBottom();
  return {
    bubble: div.querySelector('#streamBubble'),
    sourcesWrap: div.querySelector('#sourcesWrap'),
  };
}

function renderSources(wrap, sources) {
  if (!sources || sources.length === 0) return;

  // Group by document
  const grouped = {};
  sources.forEach(s => {
    if (!grouped[s.document_id]) grouped[s.document_id] = [];
    grouped[s.document_id].push(s);
  });

  const toggle = document.createElement('button');
  toggle.className = 'sources-toggle';
  toggle.innerHTML = `<span class="arrow">▶</span> 查看来源引用（${sources.length} 条）`;

  const list = document.createElement('div');
  list.className = 'sources-list';

  Object.entries(grouped).forEach(([docId, srcs]) => {
      srcs.forEach(s => {
          // 优先使用来源数据中的 filename，兜底用 docs 数组查找
          const displayName = s.filename
              || (docs.find(d => d.id == s.document_id) || {}).filename
              || `文档 #${s.document_id}`;

          const card = document.createElement('div');
          card.className = 'source-card';
          card.innerHTML = `
              <div class="source-card-header">
                  <span class="source-chip">文档 #${s.document_id}</span>
                  <span>${escapeHtml(displayName.replace(/\.[^.]+$/, ''))}</span>
                  <span style="color:var(--text3);font-size:11px">· 第 ${s.chunk_index + 1} 段</span>
              </div>
              <div class="source-snippet">${escapeHtml(s.snippet)}${s.snippet && s.snippet.length >= 148 ? '…' : ''}</div>`;
          list.appendChild(card);
      });
  });

  toggle.onclick = () => {
    toggle.classList.toggle('open');
    list.classList.toggle('visible');
  };

  wrap.appendChild(toggle);
  wrap.appendChild(list);
}

function renderMd(text) {
  // LLM 有时在冒号/文字后直接跟 ## 而不换行，marked.js 要求 # 在行首才识别为标题
  // 在非行首的 # 序列前插入换行，确保能被正确解析
  const normalized = text.replace(/([^\n])(#{1,6} )/g, '$1\n\n$2');
  try {
    return marked.parse(normalized, { breaks: true, gfm: true });
  } catch {
    return escapeHtml(text).replace(/\n/g, '<br>');
  }
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function scrollToBottom() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}

/* ══════════════════════════════════════════════
   SSE Parser (robust, handles multi-line events)
══════════════════════════════════════════════ */
// Override sendMessage with better SSE handling
(function() {
  const orig = window.sendMessage;
  window.sendMessage = async function() {
    if (isStreaming) return;
    const input = document.getElementById('questionInput');
    const question = input.value.trim();
    if (!question) return;

    if (currentMode === 'doc_qa' && selectedDocIds.size === 0) {
      toast('请先在左侧选择至少一个文档', 'error');
      return;
    }

    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    appendUserMsg(question);
    input.value = '';
    autoResize(input);

    const { bubble, sourcesWrap } = appendAssistantMsg();

    isStreaming = true;
    document.getElementById('sendBtn').disabled = true;

    const body = { mode: currentMode, session_id: sessionId, question };
    if (currentMode === 'doc_qa') body.document_ids = [...selectedDocIds];

    let fullText = '';
    let pendingEventType = 'message';

    try {
      const res = await fetch(`${API}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: res.statusText }));
        throw new Error(err.detail || res.statusText);
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      const processLine = (line) => {
        if (line.startsWith('event:')) {
          pendingEventType = line.slice(6).trim();
        } else if (line.startsWith('data:')) {
          const data = line.slice(5).startsWith(' ') ? line.slice(6) : line.slice(5);

          if (pendingEventType === 'sources') {
            try {
              const sources = JSON.parse(data);
              renderSources(sourcesWrap, sources);
            } catch {}
            pendingEventType = 'message';
          } else {
            if (data === '[DONE]') {
              bubble.classList.remove('streaming');
              bubble.innerHTML = renderMd(fullText || '（无回答）');
            } else {
              fullText += data;
              // 流式过程中用纯文本展示，避免 marked.js 解析残缺 Markdown 导致 ## 裸露
              bubble.innerHTML = escapeHtml(fullText).replace(/\n/g, '<br>');
              bubble.classList.add('streaming');
              scrollToBottom();
            }
          }
        } else if (line === '') {
          // blank line = end of event block, reset event type
          if (pendingEventType !== 'message') pendingEventType = 'message';
        }
      };

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();
        lines.forEach(processLine);
      }
      if (buffer) processLine(buffer);

      bubble.classList.remove('streaming');
      if (!fullText) bubble.innerHTML = '<em style="color:var(--text3)">（无回答）</em>';
      else bubble.innerHTML = renderMd(fullText);

    } catch (e) {
      bubble.classList.remove('streaming');
      bubble.innerHTML = `<div class="msg-error">⚠ ${escapeHtml(e.message)}</div>`;
      toast('请求失败：' + e.message, 'error');
    } finally {
      isStreaming = false;
      document.getElementById('sendBtn').disabled = false;
      scrollToBottom();
    }
  };
})();

/* ══════════════════════════════════════════════
   Init
══════════════════════════════════════════════ */
updateSessionLabel();
updateHint();
loadDocs();
// Ping health check
fetch(`${API}/documents?page=1&page_size=1`)
  .then(r => setApiStatus(r.ok))
  .catch(() => setApiStatus(false));
</script>
