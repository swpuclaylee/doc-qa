<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文档问答系统</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }
    .container { max-width: 900px; margin: 0 auto; padding: 24px; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 24px; color: #111; }
    .card { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 16px; border: 1px solid #e5e5e5; }
    .card h2 { font-size: 14px; font-weight: 600; color: #555; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.5px; }

    /* 上传 */
    .upload-area { border: 2px dashed #d0d0d0; border-radius: 6px; padding: 32px; text-align: center; cursor: pointer; transition: border-color 0.2s; }
    .upload-area:hover, .upload-area.drag-over { border-color: #4f6ef7; background: #f8f9ff; }
    .upload-area input { display: none; }
    .upload-area p { color: #888; font-size: 14px; margin-top: 8px; }

    /* 按钮 */
    .btn { border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer; font-size: 13px; font-weight: 500; transition: background 0.15s; }
    .btn-primary { background: #4f6ef7; color: #fff; }
    .btn-primary:hover { background: #3d5ce0; }
    .btn-primary:disabled { background: #aaa; cursor: not-allowed; }
    .btn-ghost { background: #f0f0f0; color: #555; }
    .btn-ghost:hover { background: #e5e5e5; }
    .btn-danger { background: #fde8e8; color: #b91c1c; }
    .btn-danger:hover { background: #fbd5d5; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }

    /* 文档列表 */
    .doc-list { display: flex; flex-direction: column; gap: 8px; }
    .doc-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border: 1px solid #e5e5e5; border-radius: 6px; cursor: pointer; transition: background 0.15s; }
    .doc-item:hover { background: #f8f9ff; }
    .doc-item.selected { border-color: #4f6ef7; background: #f0f3ff; }
    .doc-info { display: flex; flex-direction: column; gap: 2px; }
    .doc-name { font-size: 14px; font-weight: 500; }
    .doc-meta { font-size: 12px; color: #888; }
    .doc-actions { display: flex; align-items: center; gap: 8px; }
    .status-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
    .status-done { background: #e6f7ee; color: #1a7a45; }
    .status-processing { background: #fff3e0; color: #b45309; }
    .status-failed { background: #fde8e8; color: #b91c1c; }
    .status-pending { background: #f0f0f0; color: #666; }
    .del-btn { background: none; border: none; color: #ccc; cursor: pointer; font-size: 16px; padding: 2px 6px; border-radius: 4px; }
    .del-btn:hover { color: #e53e3e; background: #fde8e8; }
    .empty-tip { color: #aaa; font-size: 14px; text-align: center; padding: 20px; }

    /* 问答 */
    .session-row { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
    .session-row input { flex: 1; padding: 8px 12px; border: 1px solid #e5e5e5; border-radius: 5px; font-size: 13px; }
    .chat-toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .chat-toolbar span { font-size: 13px; color: #888; }
    .chat-box { height: 360px; overflow-y: auto; border: 1px solid #e5e5e5; border-radius: 6px; padding: 12px; margin-bottom: 12px; background: #fafafa; display: flex; flex-direction: column; gap: 10px; }
    .msg { max-width: 80%; padding: 10px 14px; border-radius: 8px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
    .msg.user { align-self: flex-end; background: #4f6ef7; color: #fff; border-bottom-right-radius: 2px; }
    .msg.assistant { align-self: flex-start; background: #fff; border: 1px solid #e5e5e5; color: #333; border-bottom-left-radius: 2px; }
    .msg.assistant.streaming::after { content: '▋'; animation: blink 0.8s infinite; }
    .msg.system { align-self: center; background: none; color: #aaa; font-size: 12px; border: none; padding: 4px 0; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    .input-row { display: flex; gap: 8px; }
    .input-row textarea { flex: 1; padding: 10px 12px; border: 1px solid #e5e5e5; border-radius: 5px; font-size: 14px; resize: none; height: 60px; font-family: inherit; }
    .input-row textarea:focus { outline: none; border-color: #4f6ef7; }
    .tip { font-size: 13px; color: #888; margin-bottom: 12px; }
    .tip span { color: #4f6ef7; font-weight: 500; }

    /* 对话历史面板 */
    .history-panel { display: none; }
    .history-panel.open { display: block; }
    .history-list { max-height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; margin-top: 12px; }
    .history-msg { padding: 8px 12px; border-radius: 6px; font-size: 13px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
    .history-msg.user { background: #eef0ff; color: #333; }
    .history-msg.assistant { background: #f5f5f5; color: #333; }
    .history-role { font-size: 11px; font-weight: 600; margin-bottom: 4px; color: #888; }

    /* Toast */
    .toast { position: fixed; bottom: 24px; right: 24px; background: #333; color: #fff; padding: 10px 18px; border-radius: 6px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
    .toast.show { opacity: 1; }
    .toast.error { background: #e53e3e; }
    .toast.success { background: #38a169; }
  </style>
</head>
<body>
<div class="container">
  <h1>文档问答系统</h1>

  <!-- API 配置 -->
  <div class="card">
    <h2>API 配置</h2>
    <div style="display:flex;gap:8px;align-items:center">
      <input id="apiBase" type="text" value="http://localhost:8000/api/v1"
        style="flex:1;padding:8px 12px;border:1px solid #e5e5e5;border-radius:5px;font-size:13px">
      <button class="btn btn-primary" onclick="loadDocuments()">连接</button>
    </div>
  </div>

  <!-- 上传文档 -->
  <div class="card">
    <h2>上传文档</h2>
    <div class="upload-area" id="uploadArea"
      ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event)"
      onclick="document.getElementById('fileInput').click()">
      <div style="font-size:32px">📄</div>
      <p>点击或拖拽文件到此处</p>
      <p>支持 PDF、Word(.docx)、TXT，最大 50MB</p>
      <input type="file" id="fileInput" accept=".pdf,.docx,.txt" onchange="handleFileSelect(event)">
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px">
      <span id="selectedFile" style="font-size:13px;color:#555"></span>
      <button class="btn btn-primary" id="uploadBtn" disabled onclick="uploadFile()">上传</button>
    </div>
  </div>

  <!-- 文档列表 -->
  <div class="card">
    <h2>文档列表 <span style="font-weight:400;color:#aaa;font-size:12px">（点击选择用于问答）</span></h2>
    <div class="doc-list" id="docList">
      <div class="empty-tip">暂无文档</div>
    </div>
  </div>

  <!-- 问答 -->
  <div class="card">
    <h2>问答</h2>
    <div id="chatTip" class="tip">请先从上方选择一个文档</div>
    <div class="session-row">
      <input id="sessionId" placeholder="会话 ID" readonly>
      <button class="btn btn-ghost" onclick="newSession()">新会话</button>
      <button class="btn btn-ghost" onclick="loadHistory()">对话历史</button>
      <button class="btn btn-danger btn-sm" onclick="clearHistory()">清空历史</button>
    </div>
    <div class="chat-toolbar">
      <span id="msgCount"></span>
    </div>
    <div class="chat-box" id="chatBox">
      <div class="msg system">选择文档后开始提问</div>
    </div>
    <div class="input-row">
      <textarea id="questionInput" placeholder="输入问题，Enter 发送，Shift+Enter 换行"
        onkeydown="handleKeydown(event)"></textarea>
      <button class="btn btn-primary" id="sendBtn" onclick="sendMessage()" disabled>发送</button>
    </div>
  </div>

  <!-- 对话历史面板 -->
  <div class="card history-panel" id="historyPanel">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h2>对话历史</h2>
      <button class="btn btn-ghost btn-sm" onclick="closeHistory()">关闭</button>
    </div>
    <div id="historyList" class="history-list"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let selectedDocId = null;
  let selectedFile = null;
  let isStreaming = false;

  function apiBase() { return document.getElementById('apiBase').value.replace(/\/$/, ''); }

  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast show ${type}`;
    setTimeout(() => t.className = 'toast', 2500);
  }

  function formatSize(b) {
    if (b < 1024) return b + ' B';
    if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
    return (b / 1024 / 1024).toFixed(1) + ' MB';
  }

  function statusBadge(s) {
    const map = { done: ['done','已就绪'], processing: ['processing','处理中'], failed: ['failed','失败'], pending: ['pending','等待中'] };
    const [cls, label] = map[s] || ['pending', s];
    return `<span class="status-badge status-${cls}">${label}</span>`;
  }

  // ==================== 上传 ====================
  function handleDragOver(e) { e.preventDefault(); document.getElementById('uploadArea').classList.add('drag-over'); }
  function handleDragLeave() { document.getElementById('uploadArea').classList.remove('drag-over'); }
  function handleDrop(e) { e.preventDefault(); document.getElementById('uploadArea').classList.remove('drag-over'); const f = e.dataTransfer.files[0]; if (f) setFile(f); }
  function handleFileSelect(e) { const f = e.target.files[0]; if (f) setFile(f); }
  function setFile(f) {
    selectedFile = f;
    document.getElementById('selectedFile').textContent = `${f.name}（${formatSize(f.size)}）`;
    document.getElementById('uploadBtn').disabled = false;
  }

  async function uploadFile() {
    if (!selectedFile) return;
    const btn = document.getElementById('uploadBtn');
    btn.disabled = true; btn.textContent = '上传中...';
    const fd = new FormData();
    fd.append('file', selectedFile);
    try {
      const res = await fetch(`${apiBase()}/documents/upload`, { method: 'POST', body: fd });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || '上传失败');
      showToast('上传成功', 'success');
      selectedFile = null;
      document.getElementById('selectedFile').textContent = '';
      document.getElementById('fileInput').value = '';
      await loadDocuments();
    } catch (e) { showToast(e.message, 'error'); }
    finally { btn.disabled = false; btn.textContent = '上传'; }
  }

  // ==================== 文档列表 ====================
  async function loadDocuments() {
    try {
      const res = await fetch(`${apiBase()}/documents`);
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || '加载失败');
      renderDocList(data.data.items || []);
    } catch (e) { showToast('加载失败: ' + e.message, 'error'); }
  }

  function renderDocList(docs) {
    const el = document.getElementById('docList');
    if (!docs.length) { el.innerHTML = '<div class="empty-tip">暂无文档</div>'; return; }
    el.innerHTML = docs.map(d => `
      <div class="doc-item ${d.id === selectedDocId ? 'selected' : ''}" onclick="selectDoc(${d.id}, '${d.filename}', '${d.status}')">
        <div class="doc-info">
          <span class="doc-name">${d.filename}</span>
          <span class="doc-meta">${formatSize(d.file_size)} · ${d.chunk_count} 个切片 · ${d.created_at?.slice(0,10)||''}</span>
        </div>
        <div class="doc-actions">
          ${statusBadge(d.status)}
          <button class="del-btn" onclick="event.stopPropagation();deleteDoc(${d.id})">×</button>
        </div>
      </div>`).join('');
  }

  function selectDoc(id, filename, status) {
    if (status !== 'done') { showToast('文档尚未处理完成', 'error'); return; }
    selectedDocId = id;
    document.getElementById('chatTip').innerHTML = `当前文档：<span>${filename}</span>`;
    document.getElementById('sendBtn').disabled = false;
    if (!document.getElementById('sessionId').value) newSession();
    clearChatBox();
    loadDocuments();
  }

  async function deleteDoc(id) {
    if (!confirm('确认删除此文档？')) return;
    try {
      const res = await fetch(`${apiBase()}/documents/${id}`, { method: 'DELETE' });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || '删除失败');
      showToast('删除成功', 'success');
      if (selectedDocId === id) {
        selectedDocId = null;
        document.getElementById('sendBtn').disabled = true;
        document.getElementById('chatTip').textContent = '请先从上方选择一个文档';
        clearChatBox();
      }
      await loadDocuments();
    } catch (e) { showToast(e.message, 'error'); }
  }

  // ==================== 会话 ====================
  function newSession() {
    document.getElementById('sessionId').value = 'session_' + Date.now();
    clearChatBox();
    closeHistory();
    showToast('新会话已创建');
  }

  function clearChatBox() {
    document.getElementById('chatBox').innerHTML = '<div class="msg system">选择文档后开始提问</div>';
    document.getElementById('msgCount').textContent = '';
  }

  // ==================== 对话历史 ====================
  async function loadHistory() {
    const sessionId = document.getElementById('sessionId').value;
    if (!sessionId || !selectedDocId) { showToast('请先选择文档并生成会话', 'error'); return; }
    try {
      const res = await fetch(`${apiBase()}/chat/${sessionId}?document_id=${selectedDocId}`);
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || '获取失败');
      renderHistory(data.data.messages || []);
      document.getElementById('historyPanel').classList.add('open');
    } catch (e) { showToast(e.message, 'error'); }
  }

  function renderHistory(messages) {
    const el = document.getElementById('historyList');
    if (!messages.length) { el.innerHTML = '<div class="empty-tip">暂无历史记录</div>'; return; }
    el.innerHTML = messages.map(m => `
      <div class="history-msg ${m.role}">
        <div class="history-role">${m.role === 'user' ? '用户' : '助手'} · ${m.created_at?.slice(0,19).replace('T',' ')||''}</div>
        ${m.content}
      </div>`).join('');
    document.getElementById('msgCount').textContent = `共 ${messages.length} 条记录`;
  }

  function closeHistory() {
    document.getElementById('historyPanel').classList.remove('open');
  }

  async function clearHistory() {
    const sessionId = document.getElementById('sessionId').value;
    if (!sessionId) { showToast('没有活跃会话', 'error'); return; }
    if (!confirm('确认清空此会话的所有对话历史？')) return;
    try {
      const res = await fetch(`${apiBase()}/chat/${sessionId}`, { method: 'DELETE' });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || '清空失败');
      showToast(data.message, 'success');
      clearChatBox();
      closeHistory();
    } catch (e) { showToast(e.message, 'error'); }
  }

  // ==================== 问答 ====================
  function handleKeydown(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function appendMsg(role, content, streaming = false) {
    const box = document.getElementById('chatBox');
    // 移除初始提示
    const sys = box.querySelector('.msg.system');
    if (sys) sys.remove();
    const div = document.createElement('div');
    div.className = `msg ${role}${streaming ? ' streaming' : ''}`;
    div.textContent = content;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
    return div;
  }

  async function sendMessage() {
    if (isStreaming || !selectedDocId) return;
    const input = document.getElementById('questionInput');
    const question = input.value.trim();
    if (!question) return;
    const sessionId = document.getElementById('sessionId').value;
    if (!sessionId) { showToast('请先生成会话 ID', 'error'); return; }

    isStreaming = true;
    document.getElementById('sendBtn').disabled = true;
    input.value = '';

    appendMsg('user', question);
    const assistantDiv = appendMsg('assistant', '', true);

    try {
      const res = await fetch(`${apiBase()}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ document_id: selectedDocId, session_id: sessionId, question }),
      });
      if (!res.ok) { const err = await res.json(); throw new Error(err.detail || '请求失败'); }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '', answer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const token = line.slice(6);
          if (token === '[DONE]') break;
          answer += token;
          assistantDiv.textContent = answer;
          document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
        }
      }
      assistantDiv.classList.remove('streaming');
    } catch (e) {
      assistantDiv.textContent = '请求失败：' + e.message;
      assistantDiv.classList.remove('streaming');
      showToast(e.message, 'error');
    } finally {
      isStreaming = false;
      document.getElementById('sendBtn').disabled = false;
      input.focus();
    }
  }

  // 初始化
  newSession();
  loadDocuments();
</script>
</body>
</html>
